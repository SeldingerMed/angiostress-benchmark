name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-smoke:
    name: Python smoke checks (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile benchmark scripts
        run: python -m compileall -q benchmark

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate JSON fixtures and contracts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path('.').rglob('*.json')):
              if '.git' in path.parts:
                  continue
              with path.open(encoding='utf-8') as handle:
                  json.load(handle)
              print(f'validated {path}')
          PY
